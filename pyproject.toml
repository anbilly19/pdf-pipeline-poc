[project]
name = "pdf-pipeline-poc"
version = "0.1.0"
description = "Agentic PDF pipeline with bounding-box citation for German-language PDFs"
requires-python = ">=3.12"
dependencies = [
    # PDF extraction
    "pymupdf>=1.25",
    "pymupdf4llm>=0.0.17",
    "pdfmux>=0.3",                         # primary extractor — smart router

    # Embeddings & vector store
    "sentence-transformers>=3.3",
    "chromadb>=0.6",

    # LangChain / LangGraph agentic stack
    "langchain>=0.3.20",
    "langchain-community>=0.3.20",
    "langchain-ollama>=0.3",               # Ollama chat model integration
    "langgraph>=0.3",                      # ReAct agent loop
    "langgraph-checkpoint>=2.0",           # conversation memory / checkpointing

    # Local LLM
    "ollama>=0.4",

    # Frontend
    "streamlit>=1.43",

    # Core
    "pillow>=11.0",
    "pydantic>=2.10",
    "httpx>=0.28",
    "tenacity>=9.0",                       # retry logic for flaky parsers
]

[project.optional-dependencies]
gpu = [
    "magic-pdf[full]>=1.3",               # MinerU VLM fallback
]
dev = [
    "pytest>=8.3",
    "pytest-cov>=6.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.9",
    "mypy>=1.14",
    "types-pillow",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.3",
    "pytest-cov>=6.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.9",
    "mypy>=1.14",
    "types-pillow",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "ANN"]

[tool.mypy]
python_version = "3.12"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
